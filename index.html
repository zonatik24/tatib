<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesiswaan - SMP Santa Angela Bandung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 90%;
        }

        .header h1 {
            font-size: 24px;
            color: #1a365d;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #718096;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 16px 20px;
            color: #ffffff;
            background: #2b6cb0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(43, 108, 176, 0.2);
        }

        /* Efek ketika tombol disorot (hover) */
        .btn:hover {
            background: #1a365d;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(26, 54, 93, 0.3);
        }

        /* Efek ketika tombol diklik */
        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
			
            <h1>Divisi Kesiswaan</h1>
            <p>SMP Santa Angela Bandung</p>
        </div>

        <nav class="nav-links">
            <a href="tatib.html" class="btn">Tata Tertib Siswa</a>
            <a href="piket.html" class="btn">Sistem Piket</a>
            <a href="peraturan.html" class="btn">Peraturan Sekolah</a>
        </nav>

        <div class="footer">
            &copy; 2026 Tim Kesiswaan SMP Santa Angela
        </div>
    </div>

</body>
</html>
